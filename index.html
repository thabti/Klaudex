<!doctype html>
<html lang="en" class="dark" style="height:100%;max-height:100vh;overflow:hidden">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Kirodex</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet" />
    </head>
    <body style="background:#0a0a0a">
        <div id="splash" style="
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            transition: opacity 0.4s ease;
        ">
            <span style="
                font-family: 'JetBrains Mono', monospace;
                font-size: 42px;
                font-weight: 700;
                letter-spacing: 12px;
                color: #7c6aef;
                text-shadow:
                    0 0 10px rgba(124, 106, 239, 0.6),
                    0 0 30px rgba(124, 106, 239, 0.4),
                    0 0 60px rgba(124, 106, 239, 0.2);
                animation: glow 2s ease-in-out infinite alternate;
            ">KIRODEX</span>
            <style>
                @keyframes glow {
                    from { text-shadow: 0 0 10px rgba(124,106,239,0.6), 0 0 30px rgba(124,106,239,0.4), 0 0 60px rgba(124,106,239,0.2); }
                    to   { text-shadow: 0 0 15px rgba(124,106,239,0.8), 0 0 40px rgba(124,106,239,0.6), 0 0 80px rgba(124,106,239,0.35), 0 0 120px rgba(124,106,239,0.15); }
                }
            </style>
        </div>
        <div id="root"></div>
        <div
            id="error-fallback"
            style="
                display: none;
                position: fixed;
                inset: 0;
                background: #0d1117;
                color: #e6edf3;
                font-family: monospace;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 12px;
                padding: 24px;
                text-align: center;
            "
        >
            <svg
                width="48"
                height="48"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#da3633"
                stroke-width="2"
            >
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            <h2 style="margin: 0; font-size: 18px; color: #da3633">
                App failed to load
            </h2>
            <p
                id="error-message"
                style="
                    margin: 0;
                    font-size: 13px;
                    color: #8b949e;
                    max-width: 480px;
                    white-space: pre-wrap;
                "
            ></p>
            <div style="display: flex; gap: 8px; margin-top: 8px;">
                <button
                    id="reload-btn"
                    style="
                        padding: 8px 20px;
                        background: #238636;
                        color: #fff;
                        border: none;
                        border-radius: 6px;
                        cursor: pointer;
                        font-size: 13px;
                    "
                >
                    Reload
                </button>
                <button
                    id="copy-error-btn"
                    style="
                        padding: 8px 20px;
                        background: #30363d;
                        color: #8b949e;
                        border: 1px solid #484f58;
                        border-radius: 6px;
                        cursor: pointer;
                        font-size: 13px;
                    "
                >
                    Copy Error
                </button>
            </div>
        </div>
        <script type="module" src="/src/renderer/main.tsx"></script>
    </body>
</html>
