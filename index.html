<!doctype html>
<html lang="en" class="dark" style="height:100%;overflow:hidden">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Klaudex</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet" />
        <script>
            // Apply theme before first paint to prevent flash
            (function(){
                var t='dark';try{t=localStorage.getItem('klaudex-theme')||'dark'}catch(e){}
                if(t==='claude'){t='dark'} // migrate legacy 'claude' value
                if(t==='system'){t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'}
                var r=document.documentElement;
                r.classList.remove('dark','claude');
                if(t==='dark'){r.classList.add('dark')}
                window.__klaudex_resolved_theme=t;
            })();
        </script>
    </head>
    <body>
        <div id="splash" style="
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
            pointer-events: none;
        ">
            <span style="
                font-family: 'JetBrains Mono', monospace;
                font-size: 42px;
                font-weight: 700;
                letter-spacing: 12px;
                color: #7c6aef;
                user-select: none;
                text-shadow:
                    0 0 10px rgba(124, 106, 239, 0.6),
                    0 0 30px rgba(124, 106, 239, 0.4),
                    0 0 60px rgba(124, 106, 239, 0.2);
                animation: glow 2s ease-in-out infinite alternate;
            ">KLAUDEX</span>
            <style>
                @keyframes glow {
                    from { text-shadow: 0 0 10px rgba(124,106,239,0.6), 0 0 30px rgba(124,106,239,0.4), 0 0 60px rgba(124,106,239,0.2); }
                    to   { text-shadow: 0 0 15px rgba(124,106,239,0.8), 0 0 40px rgba(124,106,239,0.6), 0 0 80px rgba(124,106,239,0.35), 0 0 120px rgba(124,106,239,0.15); }
                }
            </style>
        </div>
        <div id="root"></div>
        <div id="crash-fallback" style="
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 24px;
            text-align: center;
            font-family: system-ui, sans-serif;
            color: #e0e0e0;
            background: #0D0D0D;
        ">
            <button id="crash-close" aria-label="Close" style="
                position: absolute; top: 16px; right: 16px;
                width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
                border-radius: 8px; border: 1px solid #333; background: transparent;
                color: #888; font-size: 18px; cursor: pointer; line-height: 1;
            ">✕</button>
            <div style="font-size: 32px">⚠️</div>
            <h2 style="font-size: 16px; font-weight: 600; margin: 0">Klaudex failed to load</h2>
            <p style="font-size: 13px; color: #888; max-width: 360px; margin: 0; line-height: 1.5">
                The app could not start. Try reloading, or reset app data if the problem persists.
            </p>
            <div style="display: flex; gap: 8px; margin-top: 8px">
                <button id="crash-reload" style="
                    padding: 8px 16px; font-size: 13px; font-weight: 500; border-radius: 8px;
                    border: 1px solid #333; background: transparent; color: #ccc; cursor: pointer;
                ">Reload</button>
            </div>
        </div>
        <script type="module" src="/src/renderer/main.tsx"></script>
        <script>
            // If React hasn't mounted within 10s, show the crash fallback
            window.__crashTimer = setTimeout(function() {
                var root = document.getElementById('root');
                if (root && root.childElementCount === 0) {
                    var splash = document.getElementById('splash');
                    if (splash) splash.style.display = 'none';
                    var fb = document.getElementById('crash-fallback');
                    if (fb) fb.style.display = 'flex';
                }
            }, 10000);
            document.addEventListener('click', function(e) {
                if (e.target && e.target.id === 'crash-reload') {
                    window.location.reload();
                }
                if (e.target && e.target.id === 'crash-close') {
                    var fb = document.getElementById('crash-fallback');
                    if (fb) fb.style.display = 'none';
                }
            });
        </script>
    </body>
</html>
