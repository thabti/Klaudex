name: CI

on:
  push:
    branches: [main]
    tags-ignore: ['v*']  # Don't run CI on release tags — release.yml handles those
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Fast checks (every push + PR) ─────────────────────────────
  check:
    name: Lint & Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install --frozen-lockfile

      # TypeScript
      - name: TypeScript check
        run: bunx tsc --noEmit

      # Vite build (catches import errors, dead code)
      - name: Frontend build
        run: bunx vite build

      # Rust (needs system deps on Linux)
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Rust check
        working-directory: src-tauri
        run: cargo check

  # ── Tests (PRs only — skip on direct push to main) ────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: check
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install --frozen-lockfile

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: UI tests (Vitest)
        run: bunx vitest run --reporter=verbose

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

  # ── PR comment with results ────────────────────────────────────
  pr-comment:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [check, test]
    if: github.event_name == 'pull_request' && always()
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const checkJob = '${{ needs.check.result }}';
            const testJob = '${{ needs.test.result }}';
            const passed = checkJob === 'success' && testJob === 'success';

            const body = [
              `## ${passed ? '✅' : '❌'} CI Results`,
              '',
              '| Job | Status |',
              '|-----|--------|',
              `| Lint & Check | ${checkJob === 'success' ? '✅' : '❌'} ${checkJob} |`,
              `| Tests | ${testJob === 'success' ? '✅' : testJob === 'skipped' ? '⏭️' : '❌'} ${testJob} |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('CI Results')
            );

            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            };

            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: context.issue.number });
            }
